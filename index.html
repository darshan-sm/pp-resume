<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pallavi — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&family=Playfair+Display:ital,wght@0,900;1,700&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5f0e8;
      --terracotta: #c4622d;
      --terra-light: #e8896a;
      --ink: #1a1410;
      --ink-light: #4a3f35;
      --dust: #c8bfb0;
      --gold: #b89550;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      cursor: none;
    }

    /* Noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 100; opacity: 0.5;
    }

    /* Cursor */
    .cursor { position: fixed; width: 8px; height: 8px; background: var(--terracotta); border-radius: 50%; pointer-events: none; z-index: 999; transform: translate(-50%,-50%); transition: transform 0.15s; }
    .cursor-ring { position: fixed; width: 32px; height: 32px; border: 1px solid var(--terracotta); border-radius: 50%; pointer-events: none; z-index: 998; transform: translate(-50%,-50%); opacity: 0.5; }

    /* Layout */
    .page {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left */
    .left {
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    .domain {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--dust);
      text-transform: uppercase;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--terracotta);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: up 0.7s ease-out 0.2s forwards;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(72px, 9vw, 108px);
      font-weight: 900;
      line-height: 0.88;
      letter-spacing: -0.02em;
      overflow: hidden;
    }

    .name span {
      display: block;
      transform: translateY(110%);
      animation: reveal 1s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .name span:nth-child(1) { animation-delay: 0.35s; }
    .name span:nth-child(2) { font-style: italic; color: var(--terracotta); animation-delay: 0.55s; }

    .tagline {
      margin-top: 28px;
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
      color: var(--ink-light);
      line-height: 1.5;
      max-width: 340px;
      opacity: 0;
      animation: up 0.8s ease-out 0.9s forwards;
    }

    /* Email form */
    .form-wrap {
      opacity: 0;
      animation: up 0.8s ease-out 1.1s forwards;
    }

    .form-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--dust);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .form-row {
      display: flex;
      border: 1px solid var(--dust);
      overflow: hidden;
      max-width: 380px;
    }

    .form-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink);
      letter-spacing: 0.05em;
    }

    .form-row input::placeholder { color: var(--dust); }

    .form-row button {
      background: var(--terracotta);
      border: none;
      padding: 12px 20px;
      cursor: none;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--cream);
      text-transform: uppercase;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .form-row button:hover { background: var(--terra-light); }

    .form-note {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--dust);
      letter-spacing: 0.1em;
      min-height: 14px;
      transition: color 0.3s;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: up 0.6s ease-out 1.4s forwards;
    }

    .social-links {
      display: flex;
      gap: 20px;
    }

    .social-links a {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dust);
      text-decoration: none;
      transition: color 0.2s;
    }

    .social-links a:hover { color: var(--terracotta); }

    .year {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--dust);
      letter-spacing: 0.1em;
    }

    /* Right panel */
    .right {
      background: var(--ink);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Decorative rings */
    .ring {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      left: 50%; top: 50%;
      opacity: 0;
      animation: growRing 1.2s ease-out forwards;
    }
    .ring:nth-child(1) { width: 180px; height: 180px; animation-delay: 0.4s; }
    .ring:nth-child(2) { width: 340px; height: 340px; animation-delay: 0.65s; border-color: rgba(196,98,45,0.12); }
    .ring:nth-child(3) { width: 500px; height: 500px; animation-delay: 0.9s; }
    .ring:nth-child(4) { width: 660px; height: 660px; animation-delay: 1.1s; border-color: rgba(196,98,45,0.08); }
    .ring:nth-child(5) { width: 820px; height: 820px; animation-delay: 1.3s; }

    @keyframes growRing {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.6); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }

    /* Centre content */
    .right-inner {
      position: relative;
      z-index: 2;
      text-align: center;
      opacity: 0;
      animation: up 1s ease-out 1s forwards;
    }

    .avatar-ring {
      width: 120px;
      height: 120px;
      border: 1px dashed rgba(196,98,45,0.5);
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 20s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-inner {
      width: 90px;
      height: 90px;
      background: rgba(196,98,45,0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 20s linear infinite reverse;
    }

    .avatar-inner svg { color: rgba(196,98,45,0.4); }

    .right-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(245,240,232,0.25);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .right-name {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--cream);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .right-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(245,240,232,0.35);
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 16px;
      margin-top: 20px;
    }

    .blink-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--terracotta);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

    /* Typewriter line */
    .typewriter-line {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(196,98,45,0.5);
      letter-spacing: 0.1em;
      margin-top: 32px;
      min-height: 16px;
    }

    /* Divider */
    .divider {
      position: absolute;
      top: 0; bottom: 0;
      left: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--dust) 30%, var(--dust) 70%, transparent);
      opacity: 0.3;
    }

    /* Animations */
    @keyframes reveal {
      to { transform: translateY(0); }
    }
    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .page { grid-template-columns: 1fr; height: auto; }
      .right { height: 50vh; }
      .left { padding: 48px 32px; gap: 40px; }
      body { cursor: auto; }
      .cursor, .cursor-ring { display: none; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="page">

    <!-- LEFT -->
    <div class="left">
      <div class="domain">meetpallavi.com</div>

      <div class="main">
        <p class="eyebrow">✦ &nbsp;Coming very soon</p>
        <h1 class="name">
          <span>Pallavi</span>
          <span>is almost here.</span>
        </h1>
        <p class="tagline">Something wonderful is being put together. Check back shortly.</p>

        <div style="height: 40px"></div>

        <div class="form-wrap">
          <p class="form-label">✦ &nbsp;Get notified when it's live</p>
          <div class="form-row">
            <input type="email" placeholder="your@email.com" id="emailInput" />
            <button onclick="handleNotify()">Notify me</button>
          </div>
          <p class="form-note" id="formNote">One email. No noise.</p>
        </div>
      </div>

      <div class="bottom-row">
        <div class="social-links">
          <a href="#">Instagram</a>
          <a href="#">LinkedIn</a>
          <a href="#">Twitter</a>
        </div>
        <span class="year">© 2025</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="divider"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>

      <div class="right-inner">
        <div class="avatar-ring">
          <div class="avatar-inner">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>
        <p class="right-label">Profile / In progress</p>
        <p class="right-name">Pallavi</p>
        <div class="right-status">
          <div class="blink-dot"></div>
          Building now
        </div>
        <div class="typewriter-line" id="typeEl"></div>
      </div>
    </div>

  </div>

  <script>
    // Cursor
    const cur = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
    (function loop(){ rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
    document.querySelectorAll('a,button,input').forEach(el=>{
      el.addEventListener('mouseenter',()=>{ cur.style.transform='translate(-50%,-50%) scale(2.5)'; });
      el.addEventListener('mouseleave',()=>{ cur.style.transform='translate(-50%,-50%) scale(1)'; });
    });

    // Typewriter
    const lines = ['Writing the bio…','Choosing the right words…','Almost done…','Worth the wait.'];
    let pi=0,ci=0,del=false;
    const el = document.getElementById('typeEl');
    function type(){
      const p=lines[pi];
      if(!del){ el.textContent=p.slice(0,++ci); if(ci===p.length){setTimeout(()=>del=true,2000);setTimeout(type,2100);return;} }
      else{ el.textContent=p.slice(0,--ci); if(ci===0){del=false;pi=(pi+1)%lines.length;setTimeout(type,400);return;} }
      setTimeout(type,del?30:70);
    }
    setTimeout(type,1800);

    // Notify
    function handleNotify(){
      const v=document.getElementById('emailInput').value;
      const n=document.getElementById('formNote');
      if(v&&v.includes('@')){ n.textContent="✓  You're on the list."; n.style.color='#b89550'; document.getElementById('emailInput').value=''; }
      else{ n.textContent='Please enter a valid email.'; n.style.color='#c4622d'; }
    }
  </script>
</body>
</html>
